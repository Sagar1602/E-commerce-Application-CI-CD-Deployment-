name: OneCart CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: onecart

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & test, installing dependencies from the Nexus npm registry
  # ---------------------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Configure npm to use the Nexus group repository.
      # NEXUS_REGISTRY  -> e.g. http://your-nexus-host:8081/repository/npm-group/
      # NPM_TOKEN       -> Nexus npm bearer token
      - name: Configure npm for Nexus
        run: |
          echo "registry=${NEXUS_REGISTRY}" > .npmrc
          echo "${NEXUS_REGISTRY#http*:}:_authToken=${NPM_TOKEN}" >> .npmrc
          echo "always-auth=true" >> .npmrc
          echo "strict-ssl=false" >> .npmrc
        env:
          NEXUS_REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
          NPM_TOKEN: ${{ secrets.NEXUS_NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------------------------
  # 2. Publish the package to the Nexus hosted npm repository
  # ---------------------------------------------------------------------------
  publish-to-nexus:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure npm for Nexus publish
        run: |
          echo "registry=${NEXUS_PUBLISH_REGISTRY}" > .npmrc
          echo "${NEXUS_PUBLISH_REGISTRY#http*:}:_authToken=${NPM_TOKEN}" >> .npmrc
          echo "always-auth=true" >> .npmrc
          echo "strict-ssl=false" >> .npmrc
        env:
          NEXUS_PUBLISH_REGISTRY: ${{ secrets.NEXUS_PUBLISH_REGISTRY }}
          NPM_TOKEN: ${{ secrets.NEXUS_NPM_TOKEN }}

      # Publish will fail if the version already exists - bump version in package.json.
      - name: Publish package
        run: npm publish || echo "Publish skipped (version may already exist)."

  # ---------------------------------------------------------------------------
  # 3. Build and push the Docker image
  # ---------------------------------------------------------------------------
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to your Docker registry (Docker Hub, or a Nexus docker-hosted repo).
      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NPM_TOKEN=${{ secrets.NEXUS_NPM_TOKEN }}
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
